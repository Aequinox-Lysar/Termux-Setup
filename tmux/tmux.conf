# Split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Switch panes using Alt-hjkl without prefix
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Resize Panes
bind -n M-H resize-pane -L 5
bind -n M-L resize-pane -R 5
bind -n M-K resize-pane -U 5
bind -n M-J resize-pane -D 5

# Kill Pane
bind x kill-pane

# Enable mouse control ( clickable windows, panes, resizeable panes )
set -g mouse on

# Starting windows numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when window is closed
set -g renumber-windows on

# Change Prefix
set -g prefix C-Space
unbind C-b

# clear both screen and history
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-color yellow

# copy mode
setw -g mode-style 'fg=black bg=red bold'

# panes
set -g pane-border-style 'fg=colour69'
set -g pane-active-border-style 'fg=colour5'

# statusbar
set -g status-position top
set -g status-justify left
set -g status-style 'fg=red'

set -g status-left ""
set -g status-left-length 10

set -g status-right " #[fg=colour69]#[fg=colour7,bg=colour69] #[fg=colour196, bg=colour69]󱚝 #[fg=colour7, bg=colour69] HACKDROID OS  #[fg=colour196, bg=colour69]󱚝 #[fg=colour69, bg=black] #[fg=colour5, bg=black]#[fg=colour7, bg=colour5] #(~/dotfiles/scripts/german_weekday.sh) der %d.%m.%Y %H:%M Uhr #[fg=colour5, bg=black]#[default]"

set -g status-right-length 300

setw -g window-status-current-style 'fg=colour7 bg=colour92'
setw -g window-status-current-format '#[fg=colour92 bg=black]#[default] #I #W #F #[fg=colour92 bg=black]'

setw -g window-status-style 'fg=colour7 bg=colour69'
setw -g window-status-format '#[fg=colour69 bg=black]#[default] #I #W #F #[fg=colour69 bg=black]'

# messages
set -g message-style 'fg=yellow bg=red bold'
