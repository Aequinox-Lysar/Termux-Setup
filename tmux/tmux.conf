# Split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Switch panes using Alt-hjkl without prefix
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Enable mouse control ( clickable windows, panes, resizeable panes )
set -g mouse on

# Starting windows numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when window is closed
set -g renumber-windows on

# clear both screen and history
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-color yellow

# copy mode
setw -g mode-style 'fg=black bg=red bold'

# panes
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow'

# statusbar
set -g status-position top
set -g status-justify left
set -g status-style 'fg=red'

set -g status-left ""
set -g status-left-length 10

set -g status-right " #[fg=colour5,bg=black]    [><] Hackdroid - Tue das was alle anderen für unmöglich halten !!! [><] #[default]            #[fg=black, bg=yellow] #(~/dotfiles/scripts/german_weekday.sh) der %d.%m.%Y %H:%M Uhr #[default]"
set -g status-right-length 300

setw -g window-status-current-style 'fg=black bg=red'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=red bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# messages
set -g message-style 'fg=yellow bg=red bold'
